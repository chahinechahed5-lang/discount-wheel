<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discount Wheel 🎰</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Discount Wheel 🎰</h1>
        
        <div id="login-section">
            <p>Please log in with Discord to spin the wheel!</p>
            <button id="login-btn" class="btn-discord">🔗 Login with Discord</button>
        </div>

        <div id="wheel-section" class="hidden">
            <h2>Welcome, <span id="username-display">User</span>!</h2>
            <button id="spin-btn" class="btn-spin">🎡 SPIN THE WHEEL</button>
            <div id="result-display"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
